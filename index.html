<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETRO SHOOTER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}
canvas {
  border: 2px solid #0ff;
  box-shadow: 0 0 24px #0ff, 0 0 60px #0ff3;
  display: block;
  cursor: crosshair;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
// SETUP
// ============================================================
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W      = canvas.width  = 900;
const H      = canvas.height = 600;

const WORLD_W = 2400;
const WORLD_H = 2400;

// ============================================================
// AUDIO  (Web Audio API — no files needed, all synthesized)
// ============================================================
let audioCtx  = null;
let muted     = false;
let lastShootSnd = 0;
let lastHitSnd   = 0;
let lastHurtSnd  = 0;

function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone({ freq = 440, endFreq, type = 'square', vol = 0.3, dur = 0.1, delay = 0 } = {}) {
  if (muted) return;
  const ctx  = ac();
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  const t = ctx.currentTime + delay;
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (endFreq !== undefined) osc.frequency.exponentialRampToValueAtTime(endFreq, t + dur);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t);
  osc.stop(t + dur + 0.01);
}

function playNoise({ vol = 0.2, dur = 0.1, cutoff = 1000, delay = 0 } = {}) {
  if (muted) return;
  const ctx  = ac();
  const size = Math.ceil(ctx.sampleRate * dur);
  const buf  = ctx.createBuffer(1, size, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
  const src    = ctx.createBufferSource();
  src.buffer   = buf;
  const filter = ctx.createBiquadFilter();
  filter.type  = 'lowpass';
  filter.frequency.value = cutoff;
  const gain   = ctx.createGain();
  const t = ctx.currentTime + delay;
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  src.start(t);
}

function sfxShoot() {
  const now = Date.now();
  if (now - lastShootSnd < 55) return;
  lastShootSnd = now;
  playTone({ freq: 900, endFreq: 220, type: 'square', vol: 0.13, dur: 0.07 });
}

function sfxHit() {
  const now = Date.now();
  if (now - lastHitSnd < 25) return;
  lastHitSnd = now;
  playTone({ freq: 280, endFreq: 140, type: 'sawtooth', vol: 0.09, dur: 0.045 });
}

function sfxEnemyDeath() {
  playNoise({ vol: 0.22, dur: 0.14, cutoff: 500 });
  playTone({ freq: 180, endFreq: 70, type: 'sawtooth', vol: 0.13, dur: 0.12 });
}

function sfxBossDeath() {
  playNoise({ vol: 0.45, dur: 0.5, cutoff: 300 });
  playTone({ freq: 140, endFreq: 35,  type: 'sawtooth', vol: 0.28, dur: 0.45 });
  playTone({ freq: 280, endFreq: 55,  type: 'square',   vol: 0.18, dur: 0.4, delay: 0.06 });
  playTone({ freq: 420, endFreq: 100, type: 'sawtooth', vol: 0.14, dur: 0.35, delay: 0.12 });
}

function sfxPlayerHurt() {
  const now = Date.now();
  if (now - lastHurtSnd < 180) return;
  lastHurtSnd = now;
  playTone({ freq: 110, endFreq: 55, type: 'sine', vol: 0.38, dur: 0.18 });
  playNoise({ vol: 0.12, dur: 0.08, cutoff: 200 });
}

function sfxXpPickup() {
  playTone({ freq: 1400, endFreq: 1800, type: 'sine', vol: 0.055, dur: 0.055 });
}

function sfxPowerup() {
  [440, 660, 880].forEach((f, i) =>
    playTone({ freq: f, type: 'sine', vol: 0.18, dur: 0.1, delay: i * 0.07 })
  );
}

function sfxLevelUp() {
  [523, 659, 784, 1047].forEach((f, i) =>
    playTone({ freq: f, type: 'square', vol: 0.22, dur: 0.14, delay: i * 0.1 })
  );
}

function sfxWaveClear() {
  [392, 523, 659, 784].forEach((f, i) =>
    playTone({ freq: f, type: 'square', vol: 0.18, dur: 0.17, delay: i * 0.12 })
  );
}

function sfxGameOver() {
  [440, 330, 220, 165].forEach((f, i) =>
    playTone({ freq: f, endFreq: f * 0.5, type: 'sawtooth', vol: 0.22, dur: 0.24, delay: i * 0.22 })
  );
}

// ============================================================
// STATE
// ============================================================
let gameState = 'MENU'; // MENU | PLAYING | LEVEL_UP | WAVE_CLEAR | GAME_OVER
let score     = 0;
let wave      = 1;
let waveTimer = 0;
const WAVE_DELAY = 3000;
let lastTime  = 0;

const cam   = { x: 0, y: 0 };
const keys  = {};
const mouse = { x: W / 2, y: H / 2, down: false };

let bullets      = [];
let enemies      = [];
let gems         = [];
let powerups     = [];
let particles    = [];
let activeEffects = [];
let levelUpChoices = [];

// ============================================================
// UPGRADES
// ============================================================
const UPGRADE_POOL = [
  { id: 'maxhp',     name: 'IRON SKIN',   desc: '+30 Max HP & instant heal', color: '#f55',
    apply: p => { p.maxHealth += 30; p.health = Math.min(p.health + 30, p.maxHealth); } },
  { id: 'speed',     name: 'SWIFT BOOTS', desc: '+0.6 Move Speed',            color: '#5f5',
    apply: p => { p.speed += 0.6; } },
  { id: 'firerate',  name: 'RAPID FIRE',  desc: '-20% Fire Cooldown',         color: '#ff5',
    apply: p => { p.fireRate = Math.max(80, p.fireRate * 0.8); } },
  { id: 'damage',    name: 'HOT BARREL',  desc: '+8 Bullet Damage',           color: '#f80',
    apply: p => { p.damage += 8; } },
  { id: 'bspeed',    name: 'VELOCITY',    desc: '+2 Bullet Speed',            color: '#5ff',
    apply: p => { p.bulletSpeed += 2; } },
  { id: 'pierce',    name: 'PIERCING',    desc: 'Bullets pierce through enemies', color: '#a5f',
    apply: p => { p.piercing = true; } },
  { id: 'magnet',    name: 'MAGNET',      desc: '+60 XP Pickup Range',        color: '#faf',
    apply: p => { p.magnetRange += 60; } },
  { id: 'double',    name: 'DOUBLE TAP',  desc: 'Fire 2 parallel bullets',    color: '#ff8',
    apply: p => { p.doubleTap = true; } },
  { id: 'lifesteal', name: 'LIFESTEAL',   desc: 'Heal 3 HP on every kill',    color: '#f5f',
    apply: p => { p.lifesteal = true; } },
  { id: 'spread',    name: 'SPREAD SHOT', desc: '3-way bullet spread',        color: '#5af',
    apply: p => { p.spread = true; } },
  { id: 'regen',     name: 'REGENERATE',  desc: '+1 HP per second',           color: '#5f8',
    apply: p => { p.regen += 1; } },
  { id: 'explosive', name: 'EXPLOSIVE',   desc: 'Bullets explode on impact',  color: '#fa5',
    apply: p => { p.explosive = true; } },
];

// ============================================================
// PLAYER
// ============================================================
function createPlayer() {
  return {
    x: WORLD_W / 2, y: WORLD_H / 2,
    r: 14,
    speed: 3,
    health: 100, maxHealth: 100,
    xp: 0, xpToLevel: 100, level: 1,
    damage: 15,
    fireRate: 300, lastShot: 0,
    bulletSpeed: 9,
    piercing: false,
    magnetRange: 90,
    doubleTap: false,
    lifesteal: false,
    spread: false,
    regen: 0,
    explosive: false,
    invincible: false, invincibleTimer: 0,
    regenAccum: 0,
  };
}
let player = createPlayer();

// ============================================================
// WAVE DEFINITIONS
// ============================================================
function getWaveComposition(w) {
  if (w % 5 === 0) {
    return { boss: 1, grunt: w, scout: Math.floor(w / 2) };
  }
  return {
    grunt: 3 + w * 2,
    scout: w > 2 ? Math.floor(w * 0.8) : 0,
    tank:  w > 3 ? Math.floor(w * 0.4) : 0,
  };
}

function spawnEnemy(type) {
  const angle = Math.random() * Math.PI * 2;
  const dist  = 520 + Math.random() * 80;
  const x = Math.max(20, Math.min(WORLD_W - 20, player.x + Math.cos(angle) * dist));
  const y = Math.max(20, Math.min(WORLD_H - 20, player.y + Math.sin(angle) * dist));

  const defs = {
    grunt: { r: 12, speed: 1.2,  health: 30,               xpVal: 15,  color: '#f44', score: 10,  damage: 8 },
    scout: { r:  9, speed: 2.4,  health: 18,               xpVal: 20,  color: '#fa0', score: 15,  damage: 6 },
    tank:  { r: 20, speed: 0.65, health: 120,              xpVal: 50,  color: '#a44', score: 50,  damage: 15 },
    boss:  { r: 36, speed: 0.85, health: 600 + wave * 100, xpVal: 200, color: '#f0f', score: 500, damage: 20 },
  };
  const d = defs[type];
  return { x, y, type, ...d, maxHealth: d.health, dead: false, flashTimer: 0 };
}

function spawnWave(w) {
  enemies = [];
  const comp = getWaveComposition(w);
  for (const [type, count] of Object.entries(comp)) {
    for (let i = 0; i < count; i++) enemies.push(spawnEnemy(type));
  }
}

// ============================================================
// SHOOTING
// ============================================================
function tryShoot(now) {
  if (now - player.lastShot < player.fireRate) return;
  player.lastShot = now;

  const mx    = mouse.x + cam.x;
  const my    = mouse.y + cam.y;
  const angle = Math.atan2(my - player.y, mx - player.x);

  const angles = [angle];
  if (player.spread) { angles.push(angle - 0.25); angles.push(angle + 0.25); }

  for (const a of angles) {
    fireBullet(a);
    if (player.doubleTap) {
      const perp = a + Math.PI / 2;
      fireBullet(a, Math.cos(perp) * 6, Math.sin(perp) * 6);
    }
  }
}

function fireBullet(angle, offX = 0, offY = 0) {
  sfxShoot();
  bullets.push({
    x: player.x + offX, y: player.y + offY,
    vx: Math.cos(angle) * player.bulletSpeed,
    vy: Math.sin(angle) * player.bulletSpeed,
    r: 5,
    damage: player.damage,
    piercing: player.piercing,
    explosive: player.explosive,
    hits: 0,
    life: 130,
  });
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, color, count = 6, speed = 3) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.5 + Math.random());
    particles.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 30 + Math.random() * 20, maxLife: 50,
      color, r: 2 + Math.random() * 3,
    });
  }
}

function explodeAt(x, y) {
  spawnParticles(x, y, '#fa5', 18, 5);
  spawnParticles(x, y, '#ff0', 10, 3);
  for (const e of enemies) {
    if (Math.hypot(e.x - x, e.y - y) < 50) {
      e.health -= player.damage * 0.6;
      e.flashTimer = 6;
    }
  }
}

// ============================================================
// POWERUPS
// ============================================================
const POWERUP_TYPES = [
  { id: 'health',    label: 'HP+',    color: '#f55',
    apply: () => { player.health = Math.min(player.health + 40, player.maxHealth); } },
  { id: 'speedbst',  label: 'SPD',    color: '#5f5',
    apply: () => addTimedBuff('SPEED', 5000, () => player.speed += 2, () => player.speed -= 2) },
  { id: 'rapidfire', label: 'RAPID',  color: '#ff5',
    apply: () => addTimedBuff('RAPID', 5000, () => player.fireRate = Math.max(60, player.fireRate / 2), () => player.fireRate *= 2) },
  { id: 'shield',    label: 'SHIELD', color: '#5ff',
    apply: () => { player.invincible = true; player.invincibleTimer = 4000; } },
];

function addTimedBuff(label, duration, onApply, onRemove) {
  onApply();
  activeEffects.push({ label, duration, onRemove });
}

function tryDropPowerup(x, y) {
  if (Math.random() < 0.13) {
    const t = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
    powerups.push({ x, y, r: 10, ...t, bob: 0, collected: false });
  }
}

// ============================================================
// LEVEL UP
// ============================================================
function triggerLevelUp() {
  sfxLevelUp();
  gameState = 'LEVEL_UP';
  const pool = [...UPGRADE_POOL];
  levelUpChoices = [];
  for (let i = 0; i < 3 && pool.length; i++) {
    levelUpChoices.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
}

function applyUpgrade(idx) {
  if (!levelUpChoices[idx]) return;
  levelUpChoices[idx].apply(player);
  gameState = 'PLAYING';
}

// ============================================================
// COLLISION
// ============================================================
function circles(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y) < a.r + b.r;
}

// ============================================================
// UPDATE
// ============================================================
function update(dt, now) {
  if (gameState === 'WAVE_CLEAR') {
    waveTimer -= dt;
    if (waveTimer <= 0) { wave++; spawnWave(wave); gameState = 'PLAYING'; }
    return;
  }
  if (gameState !== 'PLAYING') return;

  // --- Movement ---
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (keys['ArrowUp']    || keys['w']) dy -= 1;
  if (keys['ArrowDown']  || keys['s']) dy += 1;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  player.x = Math.max(player.r, Math.min(WORLD_W - player.r, player.x + dx * player.speed));
  player.y = Math.max(player.r, Math.min(WORLD_H - player.r, player.y + dy * player.speed));

  cam.x = Math.max(0, Math.min(WORLD_W - W, player.x - W / 2));
  cam.y = Math.max(0, Math.min(WORLD_H - H, player.y - H / 2));

  // --- Shooting ---
  if (mouse.down) tryShoot(now);

  // --- Regen ---
  if (player.regen > 0) {
    player.regenAccum += player.regen * (dt / 1000);
    if (player.regenAccum >= 1) {
      player.health = Math.min(player.health + Math.floor(player.regenAccum), player.maxHealth);
      player.regenAccum %= 1;
    }
  }

  // --- Invincibility ---
  if (player.invincible) {
    player.invincibleTimer -= dt;
    if (player.invincibleTimer <= 0) player.invincible = false;
  }

  // --- Timed buffs ---
  for (const e of activeEffects) e.duration -= dt;
  for (const e of activeEffects.filter(e => e.duration <= 0)) e.onRemove();
  activeEffects = activeEffects.filter(e => e.duration > 0);

  // --- Bullets ---
  for (const b of bullets) { b.x += b.vx; b.y += b.vy; b.life--; }
  bullets = bullets.filter(b => b.life > 0 && b.x > 0 && b.x < WORLD_W && b.y > 0 && b.y < WORLD_H);

  // --- Enemies move & attack ---
  for (const e of enemies) {
    if (e.dead) continue;
    const ang = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(ang) * e.speed;
    e.y += Math.sin(ang) * e.speed;
    if (e.flashTimer > 0) e.flashTimer--;
    if (!player.invincible && circles(e, player)) {
      player.health -= e.damage * (dt / 1000);
      sfxPlayerHurt();
      if (player.health <= 0) { sfxGameOver(); gameState = 'GAME_OVER'; return; }
    }
  }

  // --- Bullet vs Enemy ---
  for (const b of bullets) {
    for (const e of enemies) {
      if (e.dead) continue;
      if (circles(b, e)) {
        e.health -= b.damage;
        e.flashTimer = 6;
        sfxHit();
        spawnParticles(b.x, b.y, e.color, 5, 2);
        if (!b.piercing) b.life = 0;
        else { b.hits++; if (b.hits > 2) b.life = 0; }
        if (b.explosive) explodeAt(b.x, b.y);
        if (e.health <= 0) {
          e.dead = true;
          score += e.score;
          e.type === 'boss' ? sfxBossDeath() : sfxEnemyDeath();
          spawnParticles(e.x, e.y, e.color, 12, 4);
          gems.push({ x: e.x, y: e.y, r: 6, val: e.xpVal, bob: Math.random() * Math.PI * 2, collected: false });
          tryDropPowerup(e.x, e.y);
          if (player.lifesteal) player.health = Math.min(player.health + 3, player.maxHealth);
        }
      }
    }
  }
  enemies = enemies.filter(e => !e.dead);

  // --- XP Gems ---
  for (const g of gems) {
    g.bob += 0.1;
    const dist = Math.hypot(player.x - g.x, player.y - g.y);
    if (dist < player.magnetRange) {
      const a  = Math.atan2(player.y - g.y, player.x - g.x);
      const spd = Math.max(4, (player.magnetRange - dist) / 8);
      g.x += Math.cos(a) * spd;
      g.y += Math.sin(a) * spd;
    }
    if (dist < player.r + g.r) {
      g.collected = true;
      sfxXpPickup();
      player.xp += g.val;
      if (player.xp >= player.xpToLevel) {
        player.xp -= player.xpToLevel;
        player.xpToLevel = Math.floor(player.xpToLevel * 1.3);
        player.level++;
        triggerLevelUp();
      }
    }
  }
  gems = gems.filter(g => !g.collected);

  // --- Powerups ---
  for (const p of powerups) {
    p.bob += 0.05;
    if (circles(p, player)) {
      p.collected = true;
      sfxPowerup();
      p.apply();
      spawnParticles(p.x, p.y, p.color, 14, 3);
    }
  }
  powerups = powerups.filter(p => !p.collected);

  // --- Particles ---
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vx *= 0.92; p.vy *= 0.92; p.life--; }
  particles = particles.filter(p => p.life > 0);

  // --- Wave clear ---
  if (enemies.length === 0) { sfxWaveClear(); gameState = 'WAVE_CLEAR'; waveTimer = WAVE_DELAY; }
}

// ============================================================
// DRAW
// ============================================================
function draw(now) {
  // Background
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#ffffff09';
  ctx.lineWidth = 1;
  const gSize = 60;
  const gox = cam.x % gSize, goy = cam.y % gSize;
  for (let x = -gox; x < W; x += gSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = -goy; y < H; y += gSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  ctx.save();
  ctx.translate(-cam.x, -cam.y);

  // World border
  ctx.strokeStyle = '#0ff5';
  ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, WORLD_W - 4, WORLD_H - 4);

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // XP Gems
  for (const g of gems) {
    const yOff = Math.sin(g.bob) * 3;
    ctx.fillStyle   = '#4df';
    ctx.shadowColor = '#4df';
    ctx.shadowBlur  = 10;
    ctx.fillRect(g.x - 5, g.y - 5 + yOff, 10, 10);
    ctx.shadowBlur = 0;
  }

  // Powerups
  for (const p of powerups) {
    const yOff = Math.sin(p.bob) * 4;
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 14;
    ctx.beginPath();
    ctx.arc(p.x, p.y + yOff, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle  = '#000';
    ctx.font       = 'bold 7px monospace';
    ctx.textAlign  = 'center';
    ctx.fillText(p.label, p.x, p.y + yOff + 3);
  }

  // Enemies
  for (const e of enemies) {
    const flash = e.flashTimer > 0;
    ctx.fillStyle   = flash ? '#fff' : e.color;
    ctx.shadowColor = e.color;
    ctx.shadowBlur  = flash ? 0 : 12;

    if (e.type === 'boss')       drawBoss(e, flash);
    else if (e.type === 'tank')  drawTank(e, flash);
    else if (e.type === 'scout') drawScout(e, flash);
    else                         drawGrunt(e, flash);

    ctx.shadowBlur = 0;

    // Health bar
    if (e.health < e.maxHealth) {
      const bw = e.r * 2.5;
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x - bw / 2, e.y - e.r - 9, bw, 5);
      ctx.fillStyle = '#0f0';
      ctx.fillRect(e.x - bw / 2, e.y - e.r - 9, bw * (e.health / e.maxHealth), 5);
    }
  }

  // Bullets
  for (const b of bullets) {
    ctx.fillStyle   = '#ff0';
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur  = 10;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Player
  drawPlayer(now);

  ctx.restore();

  // HUD (drawn in screen space, not world space)
  drawHUD(now);

  // Overlays
  if (gameState === 'MENU')       drawMenu();
  if (gameState === 'LEVEL_UP')   drawLevelUp();
  if (gameState === 'WAVE_CLEAR') drawWaveClear();
  if (gameState === 'GAME_OVER')  drawGameOver();
}

// --- Entity draw helpers ---
function drawPlayer(now) {
  const pulse = Math.sin(now / 200) * 0.3 + 0.7;
  const col   = player.invincible ? `rgba(0,255,255,${pulse})` : '#0f0';
  ctx.fillStyle   = col;
  ctx.shadowColor = col;
  ctx.shadowBlur  = 18;
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
  ctx.fill();

  // Gun barrel pointing toward mouse
  const mx  = mouse.x + cam.x;
  const my  = mouse.y + cam.y;
  const ang = Math.atan2(my - player.y, mx - player.x);
  ctx.strokeStyle = col;
  ctx.lineWidth   = 4;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(player.x + Math.cos(ang) * player.r, player.y + Math.sin(ang) * player.r);
  ctx.lineTo(player.x + Math.cos(ang) * (player.r + 12), player.y + Math.sin(ang) * (player.r + 12));
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawGrunt(e, flash) {
  ctx.fillStyle = flash ? '#fff' : e.color;
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
  ctx.fill();
}

function drawScout(e, flash) {
  ctx.fillStyle = flash ? '#fff' : e.color;
  const ang = Math.atan2(player.y - e.y, player.x - e.x);
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.rotate(ang + Math.PI / 2);
  ctx.beginPath();
  ctx.moveTo(0, -e.r);
  ctx.lineTo(e.r, e.r);
  ctx.lineTo(-e.r, e.r);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawTank(e, flash) {
  ctx.fillStyle = flash ? '#fff' : e.color;
  ctx.fillRect(e.x - e.r, e.y - e.r, e.r * 2, e.r * 2);
  ctx.strokeStyle = flash ? '#fff' : '#c66';
  ctx.lineWidth   = 3;
  ctx.strokeRect(e.x - e.r, e.y - e.r, e.r * 2, e.r * 2);
}

function drawBoss(e, flash) {
  ctx.fillStyle   = flash ? '#fff' : '#f0f';
  ctx.shadowColor = '#f0f';
  ctx.shadowBlur  = 24;
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
  ctx.fill();
  // Rotating orbs
  const t = Date.now() / 500;
  for (let i = 0; i < 4; i++) {
    const a  = t + i * (Math.PI / 2);
    const ox = e.x + Math.cos(a) * (e.r + 14);
    const oy = e.y + Math.sin(a) * (e.r + 14);
    ctx.beginPath();
    ctx.arc(ox, oy, 9, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- HUD ---
function drawHUD(now) {
  const hbw = 200, hbh = 16;

  // HP bar
  ctx.fillStyle = '#222';
  ctx.fillRect(10, 10, hbw, hbh);
  const hpPct = Math.max(0, player.health / player.maxHealth);
  ctx.fillStyle = hpPct > 0.5 ? '#0f0' : hpPct > 0.25 ? '#ff0' : '#f00';
  ctx.fillRect(10, 10, hbw * hpPct, hbh);
  ctx.strokeStyle = '#0f04';
  ctx.lineWidth   = 1;
  ctx.strokeRect(10, 10, hbw, hbh);
  ctx.fillStyle  = '#fff';
  ctx.font       = '9px "Press Start 2P", monospace';
  ctx.textAlign  = 'left';
  ctx.fillText(`HP ${Math.ceil(player.health)}/${player.maxHealth}`, 14, 23);

  // XP bar
  ctx.fillStyle = '#222';
  ctx.fillRect(10, 30, hbw, 7);
  ctx.fillStyle = '#4df';
  ctx.fillRect(10, 30, hbw * (player.xp / player.xpToLevel), 7);

  ctx.fillStyle = '#4df';
  ctx.font      = '7px "Press Start 2P", monospace';
  ctx.fillText(`LVL ${player.level}   XP ${player.xp}/${player.xpToLevel}`, 10, 50);

  // Score / Wave / Enemy count
  ctx.textAlign = 'right';
  ctx.font      = '10px "Press Start 2P", monospace';
  ctx.fillStyle = '#ff0';
  ctx.fillText(`SCORE ${score}`, W - 10, 22);
  ctx.fillStyle = '#f80';
  ctx.fillText(`WAVE  ${wave}`, W - 10, 40);
  ctx.fillStyle = '#f55';
  ctx.fillText(`ENEMIES ${enemies.length}`, W - 10, 58);

  // Mute indicator
  ctx.textAlign = 'right';
  ctx.font      = '7px monospace';
  ctx.fillStyle = muted ? '#f55' : '#555';
  ctx.fillText(muted ? '[M] MUTED' : '[M] SOUND ON', W - 10, H - 10);

  // Active buffs
  ctx.textAlign = 'left';
  ctx.font      = '7px monospace';
  let bx = 10;
  if (player.invincible) {
    ctx.fillStyle = '#5ff';
    ctx.fillText('[SHIELD]', bx, H - 10);
    bx += 72;
  }
  for (const e of activeEffects) {
    ctx.fillStyle = '#ff0';
    ctx.fillText(`[${e.label}]`, bx, H - 10);
    bx += 80;
  }
}

// --- Overlays ---
function drawMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle   = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur  = 20;
  ctx.font        = '24px "Press Start 2P", monospace';
  ctx.fillText('RETRO SHOOTER', W / 2, 150);
  ctx.shadowBlur  = 0;

  ctx.fillStyle = '#aaa';
  ctx.font      = '8px "Press Start 2P", monospace';
  const controls = [
    'ARROWS / WASD  —  Move',
    'MOUSE          —  Aim',
    'LEFT CLICK     —  Shoot',
    '',
    'Collect gems to level up.',
    'Survive every wave.',
    'Defeat bosses every 5 waves.',
  ];
  controls.forEach((l, i) => ctx.fillText(l, W / 2, 230 + i * 26));

  if (Math.floor(Date.now() / 500) % 2) {
    ctx.fillStyle = '#ff0';
    ctx.font      = '10px "Press Start 2P", monospace';
    ctx.fillText('PRESS ENTER TO START', W / 2, H - 80);
  }
}

function drawLevelUp() {
  ctx.fillStyle = 'rgba(0,0,0,0.80)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign   = 'center';
  ctx.fillStyle   = '#ff0';
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur  = 16;
  ctx.font        = '18px "Press Start 2P", monospace';
  ctx.fillText('LEVEL UP!', W / 2, 110);
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = '#ccc';
  ctx.font        = '8px "Press Start 2P", monospace';
  ctx.fillText('Click a card or press 1, 2, 3', W / 2, 136);

  const cardW = 220, cardH = 140, gap = 18;
  const totalW = cardW * 3 + gap * 2;
  const startX = (W - totalW) / 2;

  for (let i = 0; i < levelUpChoices.length; i++) {
    const u  = levelUpChoices[i];
    const cx = startX + i * (cardW + gap);
    const cy = H / 2 - cardH / 2 + 10;

    ctx.fillStyle   = '#111';
    ctx.strokeStyle = u.color;
    ctx.lineWidth   = 2;
    ctx.shadowColor = u.color;
    ctx.shadowBlur  = 12;
    ctx.fillRect(cx, cy, cardW, cardH);
    ctx.strokeRect(cx, cy, cardW, cardH);
    ctx.shadowBlur = 0;

    ctx.fillStyle = u.color;
    ctx.font      = '9px "Press Start 2P", monospace';
    ctx.fillText(u.name, cx + cardW / 2, cy + 28);

    ctx.fillStyle = '#bbb';
    ctx.font      = '7px "Press Start 2P", monospace';
    const words = u.desc.split(' ');
    let line = '', ly = cy + 54;
    for (const w of words) {
      const test = line + w + ' ';
      if (ctx.measureText(test).width > cardW - 24 && line) {
        ctx.fillText(line.trim(), cx + cardW / 2, ly);
        line = w + ' '; ly += 16;
      } else line = test;
    }
    ctx.fillText(line.trim(), cx + cardW / 2, ly);

    ctx.fillStyle = '#555';
    ctx.font      = '7px "Press Start 2P", monospace';
    ctx.fillText(`[ ${i + 1} ]`, cx + cardW / 2, cy + cardH - 12);
  }
}

function drawWaveClear() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign   = 'center';
  ctx.fillStyle   = '#0f0';
  ctx.shadowColor = '#0f0';
  ctx.shadowBlur  = 14;
  ctx.font        = '20px "Press Start 2P", monospace';
  ctx.fillText('WAVE CLEAR!', W / 2, H / 2 - 20);
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = '#aaa';
  ctx.font        = '9px "Press Start 2P", monospace';
  ctx.fillText(`WAVE ${wave + 1} INCOMING...`, W / 2, H / 2 + 20);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign   = 'center';
  ctx.fillStyle   = '#f00';
  ctx.shadowColor = '#f00';
  ctx.shadowBlur  = 20;
  ctx.font        = '22px "Press Start 2P", monospace';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 70);
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = '#ff0';
  ctx.font        = '11px "Press Start 2P", monospace';
  ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 - 20);
  ctx.fillText(`WAVE: ${wave}   LEVEL: ${player.level}`, W / 2, H / 2 + 12);
  if (Math.floor(Date.now() / 500) % 2) {
    ctx.fillStyle = '#0ff';
    ctx.font      = '9px "Press Start 2P", monospace';
    ctx.fillText('PRESS  R  TO RESTART', W / 2, H / 2 + 65);
  }
}

// ============================================================
// INPUT
// ============================================================
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'm' || e.key === 'M') muted = !muted;
  if (e.key === 'Enter' && gameState === 'MENU') {
    gameState = 'PLAYING';
    spawnWave(wave);
  }
  if ((e.key === 'r' || e.key === 'R') && gameState === 'GAME_OVER') resetGame();
  if (gameState === 'LEVEL_UP') {
    if (e.key === '1') applyUpgrade(0);
    if (e.key === '2') applyUpgrade(1);
    if (e.key === '3') applyUpgrade(2);
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const r  = canvas.getBoundingClientRect();
  mouse.x  = e.clientX - r.left;
  mouse.y  = e.clientY - r.top;
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup',   e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Level-up card click
canvas.addEventListener('click', e => {
  if (gameState !== 'LEVEL_UP') return;
  const r    = canvas.getBoundingClientRect();
  const cx   = e.clientX - r.left;
  const cy   = e.clientY - r.top;
  const cardW = 220, cardH = 140, gap = 18;
  const startX = (W - (cardW * 3 + gap * 2)) / 2;
  for (let i = 0; i < levelUpChoices.length; i++) {
    const x = startX + i * (cardW + gap);
    const y = H / 2 - cardH / 2 + 10;
    if (cx >= x && cx <= x + cardW && cy >= y && cy <= y + cardH) applyUpgrade(i);
  }
});

// ============================================================
// RESET
// ============================================================
function resetGame() {
  player        = createPlayer();
  bullets       = []; enemies = []; gems = [];
  powerups      = []; particles = []; activeEffects = [];
  score         = 0;
  wave          = 1;
  gameState     = 'PLAYING';
  spawnWave(wave);
}

// ============================================================
// GAME LOOP
// ============================================================
function loop(now) {
  const dt = Math.min(now - lastTime, 50);
  lastTime = now;
  update(dt, now);
  draw(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(loop); });
</script>
